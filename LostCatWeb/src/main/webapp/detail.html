<script>
  document.addEventListener('DOMContentLoaded', () => {

    const id = params.get('id');
    if (!id) {
      document.getElementById('detailContainer').innerHTML = '<p style="text-align:center; color:white;">未找到相关信息。</p>';
      return;
    }
    renderDetail(id);
  });
