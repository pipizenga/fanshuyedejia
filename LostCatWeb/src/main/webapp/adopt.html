<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>领养申请表</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<header>
  <div class="header-container">
    <a href="index.html" class="logo"><i class="fas fa-cat"></i> 流浪猫领养中心</a>
    <div class="menu-toggle" onclick="toggleMenu()">
      <i class="fas fa-bars"></i>
    </div>
    <nav id="main-nav">
      <a href="index.html">首页</a>
      <a href="list.html">寻猫启示</a>
      <a href="adopt.html">领养申请</a>
      <a href="publish.html">发布寻猫</a>
    </nav>
  </div>
</header>

<section class="section">
  <h2 class="section-title">🐾 领养申请表</h2>
  <div class="form-card">
    <form id="adoptForm">
      <div class="form-group">
        <label><i class="fas fa-user"></i> 姓名 *</label>
        <input type="text" name="name" required>
      </div>
      <div class="form-group">
        <label><i class="fas fa-phone-alt"></i> 联系电话 *</label>
        <input type="tel" name="phone" required>
      </div>
      <div class="form-group">
        <label><i class="fas fa-home"></i> 居住地址</label>
        <input type="text" name="address">
      </div>
      <div class="form-group">
        <label><i class="fas fa-comment"></i> 申请理由（为什么想领养）</label>
        <textarea rows="4" name="reason"></textarea>
      </div>
      <div id="adoptStatus" style="margin-bottom:16px; text-align:center;"></div>
      <button type="submit" class="btn-submit">提交申请</button>
    </form>
  </div>
</section>

<footer>
  <div class="footer-links">
    <a href="index.html">首页</a>
    <a href="list.html">寻猫启示</a>
    <a href="adopt.html">领养申请</a>
    <a href="publish.html">发布寻猫</a>
  </div>
  <p>© 2026 流浪猫领养中心 | 曾候恩</p>
</footer>

<script>
  document.getElementById('adoptForm').addEventListener('submit', function (event) {
    event.preventDefault();
    const form = event.target;
    const name = form.name.value.trim();
    const phone = form.phone.value.trim();
    const status = document.getElementById('adoptStatus');
    if (!name || !phone) {
      status.innerHTML = '<span style="color:#ffaa66;">❌ 请填写姓名和联系电话。</span>';
      return;
    }
    status.innerHTML = '<span style="color:#80ff80;">✅ 申请已提交，我们会尽快联系您！</span>';
    form.reset();
  });

  function toggleMenu() {
    document.getElementById('main-nav').classList.toggle('active');
  }
</script>
</body>
</html>
